<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Painel GEOAgenda</title><link rel="stylesheet" href="/styles.css"></head><body>
<section id="login" class="login-page"><form id="loginForm" class="login-card"><img src="/logo-geogis.png" alt="GEOGIS"><h1>Acesso ao painel</h1><p>Entre com o usuário administrativo cadastrado no Supabase.</p><label>E-mail<input type="email" name="email" required></label><label>Senha<input type="password" name="password" required></label><button class="primary" type="submit">Entrar</button><div id="loginMsg" class="error"></div></form></section>
<section id="admin" class="admin"><aside class="sidebar"><img src="/logo-geogis.png" alt="GEOGIS"><nav><a>▦ Dashboard</a><a href="/">⌂ Página pública</a></nav><button id="logout">↪ Sair</button></aside><main class="content"><header class="admin-head"><div><small>PAINEL INTERNO</small><h1>Controle de Agendamentos</h1><p>Acompanhe e atualize os atendimentos recebidos.</p></div><button id="export" class="primary">Exportar CSV</button></header><section id="stats" class="stats"></section><section class="panel"><div class="panel-top"><div class="filters"><input id="search" placeholder="Buscar nome, CPF, telefone ou bairro"><select id="statusFilter"><option value="">Todos os status</option><option>Agendado</option><option>Confirmado</option><option>Em atendimento</option><option>Realizado</option><option>Cancelado</option></select></div><button id="refresh" class="primary">Atualizar</button></div><div class="table-wrap"><table><thead><tr><th>Data/hora</th><th>Requerente</th><th>Endereço</th><th>Responsável</th><th>Status</th><th>Pendências</th><th>Ações</th></tr></thead><tbody id="rows"></tbody></table></div></section></main></section><script src="/admin.js"></script></body></html>
